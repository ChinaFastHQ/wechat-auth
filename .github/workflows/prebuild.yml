name: Expo prebuild

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  prebuild:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter expo-wechat-auth-expo-example exec expo prebuild --platform ${{ matrix.platform }} --no-install
