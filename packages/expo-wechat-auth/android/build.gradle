plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.wechatauth'
version = '0.1.0'

android {
  namespace 'expo.modules.wechatauth'

  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  api 'com.tencent.mm.opensdk:wechat-sdk-android:6.8.34'
}
